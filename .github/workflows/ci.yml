name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  template-consistency:
    name: Template Consistency
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run template consistency checks
        run: bash scripts/check-template-consistency.sh

  compose-smoke:
    name: Compose Smoke
    runs-on: ubuntu-latest
    needs: template-consistency
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync scaffold submodule
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Run compose smoke test
        run: bash scripts/ci-compose-smoke-test.sh
